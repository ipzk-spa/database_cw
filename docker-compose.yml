services:
  alcohol-store-frontend:
    container_name: alcohol-store-frontend
    build:
      context: ./frontend
    command: npm start
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DANGEROUSLY_DISABLE_HOST_CHECK: "true"
      REACT_APP_API_URL: http://alcohol-store-backend:4000
    volumes:
      - ./frontend:/usr/fe
      - fe-nm:/usr/fe/node_modules
    networks:
      alcohol-store:

  alcohol-store-backend:
    container_name: alcohol-store-backend
    build:
      context: ./backend
    command: npm run start:dev
    restart: unless-stopped
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/usr/be
      - be-nm:/usr/be/node_modules
    environment:
      POSTGRES_HOST: postgresql
      POSTGRES_PORT: 5432
      POSTGRES_DATABASE: ${POSTGRES_DATABASE}
      POSTGRES_USERNAME: ${POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    networks:
      alcohol-store:

  postgres:
    container_name: postgresql
    image: postgres:16
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DATABASE}
      POSTGRES_USER: ${POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: "/var/lib/postgresql/data/pgdata"
    networks:
      alcohol-store:

volumes:
  fe-nm:
  be-nm:
  postgres-data:

networks:
  alcohol-store:
